<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Salarishuis – Low Code Enterprise Solutions</title>
  <script>
    /*
     * Bootstrap loader – resolves the version first (cache-busted with a
     * timestamp so iOS never serves the stale version.js and therefore never
     * loads outdated assets), then injects the stylesheet and application
     * scripts with the correct version query string.
     */
    (function () {
      var vScript = document.createElement('script');
      vScript.src = 'version.js?t=' + Date.now();
      vScript.onload = function () {
        var v = '?v=' + APP_VERSION;

        /* Versioned stylesheet */
        var link = document.createElement('link');
        link.rel  = 'stylesheet';
        link.href = 'style.css' + v;
        document.head.appendChild(link);

        /* data.js must run before app.js; use onload chaining to guarantee order. */
        var dataScript = document.createElement('script');
        dataScript.src = 'data.js' + v;
        dataScript.onload = function () {
          var appScript = document.createElement('script');
          appScript.src = 'app.js' + v;
          document.body.appendChild(appScript);
        };
        document.body.appendChild(dataScript);
      };
      document.head.appendChild(vScript);
    }());
  </script>
</head>
<body>
  <div id="app">
    <!-- screens are injected by app.js -->
  </div>
</body>
</html>

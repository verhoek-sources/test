<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salary House – Low Code Enterprise Solutions</title>
  <script>
    (function () {
      var vScript = document.createElement('script');
      vScript.src = 'version.js?t=' + Date.now();
      vScript.onload = function () {
        /* Inject the versioned stylesheet – cache is busted on every new release. */
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'style.css?v=' + APP_VERSION;
        document.head.appendChild(link);

        /* Load data and app scripts in order; each waits for the previous to finish. */
        function loadScript(src, cb) {
          var s = document.createElement('script');
          s.src = src + '?v=' + APP_VERSION;
          if (cb) s.onload = cb;
          document.body.appendChild(s);
        }

        loadScript('data.js', function () {
          loadScript('app.js', null);
        });
      };
      document.head.appendChild(vScript);
    }());
  </script>
</head>
<body>
  <div id="app">
    <!-- screens are injected by app.js -->
  </div>
</body>
</html>
